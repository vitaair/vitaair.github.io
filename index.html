<h2 id="宝训"><a href="#宝训" class="headerlink" title="宝训"></a>宝训</h2><blockquote>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">诵念圣源觉真经，方式十分简便，每念焚清香三五支，小烛有无亦可，倘家中未安玉皇大帝，只安其他神圣，可在神前诵念，或其他一切神圣未安者，可在当天向北方诵念，或屋内厅堂上，或在静室内，亦可诵念，其经文分上中下三节，由早念上段，中午念中段，晚间念下段。倘若午无闲暇，可至晚间由上中下三节共念完毕，斋荤人士亦可诵念，切须静心真意，勿耗气体，酒后勿念，必穿清洁衣服，倘烂衫亦无仿，只要清洁等等......。</span><br><span class="line"></span><br><span class="line">玉皇大帝每年正月初九日为诞旦日，十一月初六日，为升天日。敬玉皇祭品须随俗礼庆祝，不分斋荤，再加鲜花为最妙品，则大香大烛可用，纸钱勿耗化费。每念圣源觉真经，不必行跪拜礼，须行现代礼，因玉皇大帝行仁义道德，只是未念前先行一鞠躬礼，念完毕后，再行三鞠躬礼，倘不用鞠躬礼者，或用拱手礼亦可，经中有说明，只要原人诵心中存点仁义道德心，则有求必应也，圣源觉真经，不比其他经券。</span><br><span class="line"></span><br><span class="line">若原人无闲暇，可使亲属人代念，或自己在旁听，行拱手礼，或使别人代念亦可，使神前有诵念声音，即是功果也。其原因使诵念功果日久圆满之故也。在他处各神场，圣庙，喜度。神旦十足通行诵念，则助神佛再加灵显。可保永无劫运也。</span><br><span class="line"></span><br><span class="line">玉皇大帝上天为帝主经文行仁义道德，曾感动天日。故后代人诵念，功果伟大，其余诸多灵显，不能尽录，该经文不可后代人加改句话，恐反遭阻塞，切！切！若经文传刻市面，常必上天赐福无量。</span><br></pre></td></tr></table></figure>
</blockquote>
